<div id="endScreen" class="screen end-screen screen--hidden">
    <div class="end-screen__frame">
        <div class="end-screen__banner" aria-hidden="true"></div>
        <div class="end-screen__content">
            <h2 id="endTitle" class="end-screen__title">Game Over</h2>
            <p id="endMessage" class="end-screen__message">Du wurdest besiegt.</p>
            <button id="restartButton" class="btn btn--primary" type="button">Nochmal spielen</button>
            <button id="exitButton" class="btn btn--secondary" type="button">Hauptmenü</button>
        </div>
    </div>
</div>
